extends:
  - "@commitlint/config-conventional"

rules:
  body-max-line-length:
    - 0
    - always
    - Infinity
  type-enum:
    - 2
    - always
    - [build, ci, docs, feat, fix, perf, refactor, test]
  scope-enum:
    - 2
    - always
    - [
        repo,
        arky,
        arky-core,
        arky-provider,
        arky-claude-code,
        arky-codex,
        arky-tools,
        arky-tools-macros,
        arky-mcp,
        arky-session,
        arky-hooks,
        arky-config,
        arky-protocol,
        arky-error,
        arky-server,
      ]
  subject-case:
    - 0
    - always
    - []
